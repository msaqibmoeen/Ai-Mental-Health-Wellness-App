name: ai_mental_health
description: "AI Mental Health Wellness App built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI & theming
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2

  # Media & HTTP + Charts + Audio
  image_picker: ^1.2.1
  http: ^1.6.0
  fl_chart: ^0.68.0
  audioplayers: ^6.1.0

  # Voice features for ChatBot
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.3
  permission_handler: ^11.3.1

  # Firebase + state management
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  provider: ^6.0.5

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  path: ^1.9.0

  # External links / dialer
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting & Code Generation
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1


flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/1.png
    - assets/images/2.png
    - assets/images/3.png
    - assets/images/profile.png
    - assets/sounds/rain.mp3
    - assets/sounds/ocean.mp3
    - assets/sounds/forest.mp3
    - assets/sounds/white_noise.mp3

  fonts:
    - family: Times New Roman
      fonts:
        - asset: assets/fonts/times.ttf